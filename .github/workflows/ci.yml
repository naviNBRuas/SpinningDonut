name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify
        run: make verify

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: donut-ci-artifacts
          path: |
            dist/donut-linux-x86_64
            dist/donut-linux-x86_64.tar.gz
            dist/SHA256SUMS.txt
          if-no-files-found: error
