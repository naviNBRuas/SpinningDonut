name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
      make_latest:
        description: "Mark as latest release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Use semantic versioning like v1.0.0 or v1.2.3-rc1"
            exit 1
          fi

      - name: Verify and package
        run: make verify

      - name: Create and push tag if missing
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG"
            echo "Created local tag $TAG"
          fi

          if git remote get-url origin >/dev/null 2>&1; then
            if [[ "${GITHUB_ACTOR:-}" == "nektos/act" ]]; then
              echo "ACT local run detected; skipping push to origin."
            else
              git push origin "$TAG"
            fi
          else
            echo "No origin remote configured; skipping tag push."
          fi

      - name: Create GitHub release
        if: ${{ github.actor != 'nektos/act' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.make_latest && 'true' || 'false' }}
          files: |
            dist/donut-linux-x86_64
            dist/donut-linux-x86_64.tar.gz
            dist/SHA256SUMS.txt

      - name: Local ACT release summary
        if: ${{ github.actor == 'nektos/act' }}
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          echo "Local ACT mode: release publish step skipped by design."
